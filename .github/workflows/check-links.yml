name: Check Links

on:
  pull_request:
    paths:
      - 'data/projects.json'
  schedule:
    - cron: '0 12 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check repository links
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINK_ISSUES_OUT: ${{ runner.temp }}/link-issues.json
        run: node scripts/check-links.js

      - name: Sync cleanup issue
        if: always() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINK_ISSUES_FILE: ${{ runner.temp }}/link-issues.json
        run: node scripts/sync-link-cleanup-issue.js
